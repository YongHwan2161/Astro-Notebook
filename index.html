<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
</head>
<body>
    <h1>WebSocket Client</h1>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
    <script>
        let socket = new WebSocket("https://improved-zebra-wpw5q79q7wg3559r-8080.app.github.dev/");

        socket.onopen = function(event) {
            document.getElementById('messages').innerHTML += '<p>Connected to server</p>';
        };

        socket.onmessage = function(event) {
            const messagesDiv = document.getElementById('messages');
            const message = document.createElement('p');
            message.textContent = 'Server: ' + event.data;
            messagesDiv.appendChild(message);
        };

        socket.onclose = function(event) {
            document.getElementById('messages').innerHTML += '<p>Disconnected from server</p>';
        };

        socket.onerror = function(error) {
            document.getElementById('messages').innerHTML += '<p>Error: ' + error.message + '</p>';
        };

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value;
            socket.send(message);

            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('p');
            messageElement.textContent = 'You: ' + message;
            messagesDiv.appendChild(messageElement);

            input.value = '';
        }
    </script>
</body>
</html>
